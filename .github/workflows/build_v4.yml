name: Build TechAdmin V4 Final

on:
  push:
    branches: [ main ]

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Environment & Fix JSON
        run: |
          # 1. Tạo thư mục web và copy file HTML vào làm trang chủ
          mkdir -p www
          cp admin-mobile-v2.html www/index.html

          # 2. Tạo file package.json chuẩn (không để bên ngoài dễ lỗi)
          cat <<EOF > package.json
          {
            "name": "tech-admin-v4",
            "version": "4.0.0",
            "dependencies": {
              "@capacitor/android": "^5.7.0",
              "@capacitor/core": "^5.7.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^5.7.0"
            }
          }
          EOF

          # 3. Tạo file capacitor.config.json trực tiếp để tránh lỗi "Unexpected end of JSON"
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.techadmin.v4",
            "appName": "TechAdmin V4",
            "webDir": "www",
            "server": {
              "androidScheme": "https",
              "cleartext": true
            }
          }
          EOF

      - name: Install Dependencies
        run: npm install

      - name: Setup Java 17 (Tiêu chuẩn Android mới)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Android Platform Setup
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: TechAdmin-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

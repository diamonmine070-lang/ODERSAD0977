name: Build Android APK Node24

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Init Project
        run: |
          mkdir -p www
          cp index.html www/index.html
          printf '{"name":"app","version":"1.0.0","dependencies":{"@capacitor/android":"5.7.0","@capacitor/core":"5.7.0"},"devDependencies":{"@capacitor/cli":"5.7.0"}}\n' > package.json
          printf '{"appId":"com.techadmin.app","appName":"TechAdmin","webDir":"www","server":{"androidScheme":"https"}}\n' > capacitor.config.json

      - name: Install & Sync Capacitor
        run: |
          npm install
          npx cap add android
          npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TechAdmin-Node24-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

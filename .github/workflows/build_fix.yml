name: Build Fix Final

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Force Create Config Files
        run: |
          # Xóa sạch tàn dư cũ nếu có để tránh xung đột
          rm -f package.json capacitor.config.json
          
          # Tạo lại package.json từ đầu
          echo '{
            "name": "tech-admin",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/android": "^5.7.0",
              "@capacitor/core": "^5.7.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^5.7.0"
            }
          }' > package.json

          # Tạo lại capacitor.config.json chuẩn đét
          echo '{
            "appId": "com.techadmin.app",
            "appName": "TechAdmin",
            "webDir": "www",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

          # Chuẩn bị thư mục web
          mkdir -p www
          cp admin-mobile-v2.html www/index.html

      - name: Install & Build Android
        run: |
          npm install
          npx cap add android
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TechAdmin-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
